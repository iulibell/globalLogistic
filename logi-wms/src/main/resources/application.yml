spring:
  application:
    name: logi-wms
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    loadbalancer:
      enabled: true
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
server:
  port: 8721

sa-token:
  token-name: satoken
  jwt-secret-key: globalLogi-shared-jwt-secret-for-dev-DO-NOT-USE-in-prod-32b
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  token-prefix: Bearer
  is-log: true
  is-read-header: true
  is-read-body: false

secure:
  ignore:
    urls: []

security:
  internal:
    enabled: false
    token-value: ${SECURITY_INTERNAL_TOKEN:}

seata:
  enabled: true
  tx-service-group: ${SEATA_TX_SERVICE_GROUP:global_logistic_tx_group}
  service:
    vgroup-mapping:
      global_logistic_tx_group: ${SEATA_VGROUP_MAPPING:default}
    grouplist:
      default: ${SEATA_SERVER_ADDR:127.0.0.1:8091}
  registry:
    type: file
  config:
    type: file

snowflake:
  worker-id: 1
  datacenter-id: 1
