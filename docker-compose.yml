name: global-logistic

services:
  mysql:
    image: mysql:8.4
    container_name: gl-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: global_logistic
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=300
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: gl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: gl-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: gl-nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_logs:/home/nacos/logs

  seata:
    # 与 logi-* 模块 seata-spring-boot-starter 2.6.x 对齐
    image: apache/seata-server:2.6.0
    container_name: gl-seata
    ports:
      - "8091:8091"
    environment:
      SEATA_PORT: 8091
      STORE_MODE: file

  gl-system:
    image: maven:3.9-eclipse-temurin-17
    container_name: gl-system
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl gl-system -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8501:8501"
    depends_on:
      - mysql
      - redis
      - nacos

  gl-auth:
    image: maven:3.9-eclipse-temurin-17
    container_name: gl-auth
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl gl-auth -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8602:8602"
    depends_on:
      - mysql
      - redis
      - nacos

  logi-admin:
    image: maven:3.9-eclipse-temurin-17
    container_name: logi-admin
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl logi-admin -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8601:8601"
    depends_on:
      - mysql
      - redis
      - nacos

  logi-oms:
    image: maven:3.9-eclipse-temurin-17
    container_name: logi-oms
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl logi-oms -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      SEATA_ENABLED: "true"
      SEATA_SERVER_ADDR: seata:8091
    ports:
      - "8711:8711"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos
      - seata

  logi-tms:
    image: maven:3.9-eclipse-temurin-17
    container_name: logi-tms
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl logi-tms -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      SEATA_ENABLED: "true"
      SEATA_SERVER_ADDR: seata:8091
    ports:
      - "8701:8701"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos
      - seata

  logi-wms:
    image: maven:3.9-eclipse-temurin-17
    container_name: logi-wms
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl logi-wms -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      SEATA_ENABLED: "true"
      SEATA_SERVER_ADDR: seata:8091
    ports:
      - "8721:8721"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos
      - seata

  gl-message:
    image: maven:3.9-eclipse-temurin-17
    container_name: gl-message
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl gl-message -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8731:8731"
    depends_on:
      - mysql
      - nacos

  gl-gateway:
    image: maven:3.9-eclipse-temurin-17
    container_name: gl-gateway
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - m2_cache:/root/.m2
    command: mvn -pl gl-gateway -am spring-boot:run -DskipTests
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/global_logistic?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8502:8502"
    depends_on:
      - mysql
      - redis
      - nacos
      - gl-system
      - gl-auth
      - logi-admin
      - logi-tms
      - logi-oms
      - logi-wms

  frontend:
    image: node:22-alpine
    container_name: gl-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      # 与 vite 代理一致：经 gl-gateway 转发 /auth、/admin、/wms、/tms 等（容器内网关端口见 gl-gateway SERVER_PORT）
      VITE_PROXY_LOGI_GATEWAY: http://gl-gateway:8102
    ports:
      - "5174:5174"
    depends_on:
      - gl-gateway

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  nacos_logs:
  m2_cache:
  frontend_node_modules:
