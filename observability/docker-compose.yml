# 在项目 observability 目录执行: docker compose up -d
# 需先在宿主机启动各 Spring 服务，Prometheus 通过 host.docker.internal 抓取指标（Windows / Docker Desktop 默认可用）
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: global-logistic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: global-logistic-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
